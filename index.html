<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tecuan | iPhone 17 Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --verde-tecuan: #00C853;
            --oro: #FFD700;
            --negro-fondo: #121212;
            --gris-oscuro: #1e1e1e;
            --blanco: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--negro-fondo);
            color: var(--blanco);
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }

        /* Imágenes del Header */
        .logo-principal { width: 180px; margin: 20px auto; display: block; }
        .iphone-banner { width: 100%; border-radius: 15px; border: 1px solid var(--verde-tecuan); margin-bottom: 20px; }

        .precio-badge { background: var(--oro); color: black; padding: 5px 20px; border-radius: 50px; font-weight: bold; display: inline-block; margin-bottom: 20px; }

        /* Cuadro de Premios */
        .premios-box {
            background: var(--gris-oscuro);
            border: 1px dashed var(--oro);
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            margin: 10px;
        }

        /* Buscador */
        .search-container { margin: 20px 10px; }
        #search-input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--verde-tecuan);
            background: #000;
            color: white;
            font-size: 1.1em;
            box-sizing: border-box;
        }

        /* Cuadrícula de Números */
        .numeros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
            margin: 20px 10px;
            max-height: 400px;
            overflow-y: auto;
            background: #000;
            padding: 15px;
            border-radius: 10px;
        }

        .numero {
            background: #333;
            padding: 12px 0;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .numero.selected { background: var(--verde-tecuan); color: white; transform: scale(1.1); }
        .numero.hidden { display: none; }

        /* Formulario */
        .form-container { background: var(--gris-oscuro); padding: 20px; border-radius: 15px; margin: 20px 10px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #121212;
            color: white;
            box-sizing: border-box;
        }

        .btn-apartar {
            background: var(--verde-tecuan);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
        }

        .footer-text { font-size: 0.8em; opacity: 0.7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="Logo Rifas el tecuan.png" class="logo-principal" alt="Logo">
    <img src="Para rifas 17 Pro Max.jpeg" class="iphone-banner" alt="iPhone 17 Pro Max">

    <div class="precio-badge">BOLETO $75 MXN</div>

    <div class="premios-box">
        <div style="margin-bottom:8px">🥇 <b>MAYOR:</b> <span style="color:var(--verde-tecuan)">IPHONE 17 PRO MAX</span></div>
        <div style="margin-bottom:8px">⚡ <b>PRE-EVENTO (50%):</b> <span style="color:var(--oro)">$5,000 MXN</span></div>
        <div>🎁 <b>PRONTO PAGO:</b> <span style="color:var(--verde-tecuan)">$2,000 MXN</span></div>
    </div>

    <div class="search-container">
        <input type="number" id="search-input" placeholder
