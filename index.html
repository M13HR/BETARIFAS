<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifas El Tecuan</title>
    <style>
        :root { --primary: #25d366; --gold: #ffd700; --apartado: #f39c12; --pagado: #e74c3c; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: var(--card); border-radius: 30px; border: 1px solid #333; overflow: hidden; text-align: center; padding-bottom: 50px; }
        
        .hero { background: linear-gradient(180deg, #1b4d2b 0%, #0a0a0a 100%); padding: 20px; border-bottom: 4px solid var(--primary); }
        .logo-img { width: 120px; margin-bottom: 10px; }
        .hero h1 { color: var(--gold); font-size: 24px; margin: 0; }
        .price-badge { background: var(--gold); color: black; display: inline-block; padding: 5px 15px; border-radius: 50px; font-weight: bold; margin-top: 10px; }
        
        .promo-img { width: 90%; border-radius: 20px; margin: 15px auto; border: 1px solid #444; display: block; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; height: 260px; overflow-y: auto; background: #000; padding: 15px; border-radius: 15px; margin: 15px; border: 1px solid #222; }
        .num { padding: 12px 0; background: #2a2a2a; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .num.selected { background: var(--primary) !important; color: black !important; transform: scale(1.05); }
        .num.apartado { background: var(--apartado); color: white; cursor: not-allowed; }
        .num.pagado { background: var(--pagado); color: white; cursor: not-allowed; opacity: 0.5; }
        
        /* SECCIÓN PASO 2: OCULTA POR DEFECTO */
        #seccion-datos { display: none; padding: 0 15px; text-align: left; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .contador-flotante { color: var(--primary); font-size: 18px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; font-size: 16px; font-family: sans-serif; }
        .btn-apartar { background: var(--primary); color: black; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .footer-info { font-family: sans-serif; font-size: 12px; color: #aaa; padding: 20px; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="app">
        <div class="hero">
            <img src="Logo Rifas el tecuan.png" class="logo-img" alt="Logo">
            <h1>IPHONE 17 PRO MAX</h1>
            <div class="price-badge">BOLETO $75 MXN</div>
        </div>

        <img src="Para rifas 17 Pro Max.jpeg" class="promo-img" alt="Sorteo">

        <h2 id="instruccion" style="font-size: 18px; color: var(--gold); margin-top: 20px;">1. TOCA TUS NÚMEROS DE LA SUERTE</h2>

        <input type="number" id="search" placeholder="🔍 BUSCAR NÚMERO..." style="width:90%; margin:10px auto; padding: 12px; border-radius: 10px; background: #111; color: white; border: 1px solid #333;">

        <div id="grid" class="grid">Cargando boletos...</div>

        <div id="seccion-datos">
            <div class="contador-flotante" id="msg-seleccion">Has seleccionado: 0 boletos</div>
            
            <h2 style="font-size: 18px; color: var(--gold);">2. REGISTRA TU APARTADO</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="number" id="whatsapp" placeholder="WhatsApp (10 dígitos)">
            
            <input list="estadosLista" id="estadoRep" placeholder="Selecciona tu Estado">
            <datalist id="estadosLista">
                <option value="Puebla"><option value="Oaxaca"><option value="CDMX"><option value="Veracruz"><option value="Guerrero">
            </datalist>

            <input type="text" id="municipio" placeholder="¿De qué municipio nos visitas?">
            
            <button id="btn" class="btn-apartar" onclick="enviar()">¡APARTAR MI SUERTE! 🍀</button>
        </div>

        <div class="footer-info">
            📍 <b>UBICACIÓN:</b> Acatlán de Osorio, Puebla.<br>
            📅 <b>SORTEO:</b> 14 de Abril | ⏳ <b>PAGO:</b> 6 horas límite.
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi6SvyoAhvWftjI5ZfmaFJ2u38eQlpcGiiISKLyA26KpSFvIMT70USxhzI7P3nVYmEgQ/exec"; 
        let seleccionados = [];

        async function cargar() {
            try {
                const r = await fetch(SCRIPT_URL);
                const data = await r.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for(let i=0; i<1000; i++) {
                    let n = i.toString().padStart(3, '0');
                    let div = document.createElement('div');
                    div.innerText = n; div.id = "n-"+n;
                    if (data.pagados.includes(n)) div.className = 'num pagado';
                    else if (data.apartados.includes(n)) div.className = 'num apartado';
                    else { div.className = 'num'; div.onclick = () => togg(n, div); }
                    grid.appendChild(div);
                }
            } catch (e) { document.getElementById('grid').innerText = "Error de conexión."; }
        }

        function togg(n, el) {
            if(seleccionados.includes(n)) { 
                seleccionados = seleccionados.filter(x => x !== n); 
                el.classList.remove('selected'); 
            } else { 
                seleccionados.push(n); 
                el.classList.add('selected'); 
            }
            
            // Lógica para mostrar/ocultar el formulario
            const seccion = document.getElementById('seccion-datos');
            const instruccion = document.getElementById('instruccion');
            const msg = document.getElementById('msg-seleccion');

            if(seleccionados.length > 0) {
                seccion.style.display = 'block';
                instruccion.style.display = 'none';
                msg.innerText = `Has seleccionado: ${seleccionados.length} boleto(s) (${seleccionados.join(', ')})`;
                if(seleccionados.length === 1) seccion.scrollIntoView({behavior:'smooth'});
            } else {
                seccion.style.display = 'none';
                instruccion.style.display = 'block';
            }
        }

        function calcularTotal(cant) {
            let t = 0, c = cant;
            while(c > 0) {
                if(c >= 5) { t += 300; c -= 5; }
                else if(c >= 3) { t += 200; c -= 3; }
                else { t += (c * 75); c = 0; }
            }
            return t;
        }

        async function enviar() {
            const n = document.getElementById('nombre').value;
            const w = document.getElementById('whatsapp').value;
            const est = document.getElementById('estadoRep').value;
            const mun = document.getElementById('municipio').value;

            if(!n || !w || !est || !mun) return alert("Por favor, llena todos tus datos.");
            
            const b = document.getElementById('btn');
            b.innerText = "PROCESANDO..."; b.disabled = true;

            fetch(SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ nombre:n, whatsapp:w, boletos: seleccionados.join(', '), estadoRep: est, municipio: mun }) 
            });
            
            const total = calcularTotal(seleccionados.length);

            setTimeout(() => {
                const msj = `📱 *RIFAS EL TECUAN* 🐯\n\n` +
                            `👤 *NOMBRE:* ${n}\n` +
                            `📍 *ORIGEN:* ${mun}, ${est}\n` +
                            `🔢 *BOLETOS:* ${seleccionados.join(', ')}\n` +
                            `💰 *TOTAL:* $${total} MXN\n\n` +
                            `Tengo 6 HORAS para enviar mi comprobante. 🍀`;

                window.top.location.href = `https://api.whatsapp.com/send?phone=529531024519&text=${encodeURIComponent(msj)}`;
            }, 1000);
        }

        document.getElementById('search').oninput = function() {
            let val = this.value.padStart(3, '0').slice(-3);
            document.getElementById("n-"+val)?.scrollIntoView({behavior:'smooth', block:'center'});
        };
        cargar();
    </script>
</body>
</html>
